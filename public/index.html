<!DOCTYPE html>
<html lang="no">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bohus prisovervåking · MVP</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #FAFAF8;
    --surface: #FFFFFF;
    --border: #E5E5E0;
    --text: #1E2E2E;
    --text-mute: #5C6968;
    --teal: #52EBB0;
    --teal-dark: #0F6E56;
    --dark: #293D3D;
    --dark-deep: #1E2E2E;
    --fog: #F0FFFF;
  }

  html, body {
    font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--bg);
    color: var(--text);
    -webkit-font-smoothing: antialiased;
    font-size: 14px;
    line-height: 1.5;
    min-height: 100vh;
  }

  .page {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    gap: 12px;
  }

  .brand-logo {
    width: 36px;
    height: 36px;
    border-radius: 8px;
    background: var(--dark-deep);
    color: var(--teal);
    display: flex;
    align-items: center;
    justify-content: center;
    font-weight: 600;
    font-size: 16px;
    margin-bottom: 8px;
  }

  .message {
    font-size: 16px;
    font-weight: 500;
    color: var(--text);
  }

  .sub {
    font-size: 12px;
    color: var(--text-mute);
  }
</style>
</head>
<body>

<div class="page">
  <div class="brand-logo">B</div>
  <div class="message">Under oppdatering</div>
  <div class="sub">Kom tilbake snart</div>
</div>

</body>
</html>
